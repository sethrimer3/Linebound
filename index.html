<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Build number — increment this (and agents.md) every time an AI agent works on the project -->
  <meta name="build" content="7">
  <title>Linebound</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!--
    #app — top-level shell that contains all scenes.
    Scenes are absolutely positioned layers; only one should be visible at a time.
  -->
  <div id="app">

    <!-- Build badge: shown in the top-left corner on all screens -->
    <div id="build-badge" aria-hidden="true">build 7</div>

    <!-- ============================================================
         Main Menu Scene
         Shown on load and whenever the player returns from gameplay.
         ============================================================ -->
    <section id="scene-menu" class="scene">
      <h1 class="menu-title">Linebound</h1>

      <nav class="menu-buttons" aria-label="Main menu">
        <!-- Start Game: enters the game scene -->
        <button id="btn-start-game" class="menu-btn primary">Start Game</button>

        <!-- Settings: opens the settings overlay (stub) -->
        <button id="btn-settings" class="menu-btn">Settings</button>

        <!-- Export Save: downloads the save file as JSON -->
        <button id="btn-export-save" class="menu-btn">Export Save</button>

        <!-- Import Save: opens a file picker to load a JSON save file -->
        <button id="btn-import-save" class="menu-btn">Import Save</button>
      </nav>

      <!-- Status message shown briefly after export/import actions -->
      <p id="menu-status" class="menu-status hidden" role="status" aria-live="polite"></p>
    </section>

    <!-- ============================================================
         Game Scene
         Hidden by default; shown when gameplay starts.
         ============================================================ -->
    <section id="scene-game" class="scene hidden">
      <!-- Full-viewport canvas — the game renders here -->
      <canvas id="game-canvas"></canvas>

      <!-- Overlay button to return to the main menu -->
      <button id="btn-back-to-menu">← Back to Menu</button>
    </section>

  </div>

  <!-- Compiled TypeScript bundle (generated by `npm run build`) -->
  <script src="dist/bundle.js"></script>
</body>
</html>
